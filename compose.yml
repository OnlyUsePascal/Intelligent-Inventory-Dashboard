services:
  inventory:
    build:
      context: .
    depends_on:
      - inventory-pg
    ports:
      - "8080:8080"
    networks:
      - keyloop_net
    env_file: .env
    environment:
      - POSTGRES_URI=jdbc:postgresql://inventory-pg:5432/keyloop_db?user=keyloop_user&password=keyloop_pwd

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    networks:
      - keyloop_net
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    networks:
      - keyloop_net
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

  inventory-pg:
    image: "postgres:17"
    ports:
      - "5432:5432"
    networks:
      - keyloop_net
    environment:
      - POSTGRES_DB=keyloop_db
      - POSTGRES_USER=keyloop_user
      - POSTGRES_PASSWORD=keyloop_pwd

networks:
  keyloop_net:
    driver: bridge
