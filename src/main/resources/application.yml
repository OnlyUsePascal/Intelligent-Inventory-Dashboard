spring:
  application:
    name: inventory
  config:
    import:
      - optional:file:.env[.properties]
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate.format_sql: true
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect

  datasource:
    url: ${POSTGRES_URI}
    driver-class-name: org.postgresql.Driver

server:
  port: 8081
